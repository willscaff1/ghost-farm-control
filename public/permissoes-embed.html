<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupos e Cargos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #12121f;
            color: #e8e9f0;
            padding: 18px;
            font-size: 14px;
            line-height: 1.45;
        }
        .head { margin-bottom: 18px; }
        .head h2 { font-size: 20px; font-weight: 700; letter-spacing: .2px; }
        .head p { color: #8a8ea3; font-size: 13px; margin-top: 3px; }

        .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
        .spacer { flex: 1; }

        .btn { font-family: inherit; border: none; border-radius: 9px; cursor: pointer; font-size: 14px; font-weight: 600; padding: 10px 16px; color: #fff; transition: filter .15s ease, transform .08s ease; white-space: nowrap; }
        .btn:hover { filter: brightness(1.12); }
        .btn:active { transform: translateY(1px); }
        .btn-primary { background: #6c5ce7; }
        .btn-ghost { background: #23233a; color: #cfd2e2; }
        .btn-danger { background: #e74c3c; }
        .btn-sm { padding: 8px 13px; font-size: 13px; }

        /* Lista de grupos (linhas — mais limpo que cards grandes) */
        .groups-list { display: flex; flex-direction: column; gap: 8px; }
        .group-row {
            display: flex; align-items: center; gap: 14px;
            padding: 11px 16px;
            background: #191926;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            transition: border-color .15s ease, background .15s ease;
        }
        .group-row:hover { border-color: rgba(108,92,231,0.4); background: #1c1c2c; }
        .g-avatar { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 19px; background: rgba(108,92,231,0.14); border: 1px solid rgba(108,92,231,0.3); flex: 0 0 auto; }
        .g-info { flex: 1 1 180px; min-width: 0; }
        .g-name { display: block; font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .g-id { display: block; font-size: 12px; color: #74778c; margin-top: 1px; }
        .g-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; flex: 0 0 auto; }
        .lvl-membro { background: rgba(149,165,166,0.18); color: #b9c0c9; }
        .lvl-gerente { background: rgba(46,204,113,0.16); color: #2ecc71; }
        .lvl-admin { background: rgba(241,196,15,0.16); color: #f1c40f; }
        .lvl-custom { background: rgba(52,152,219,0.16); color: #4aa3e0; }
        .g-count { font-size: 13px; color: #8a8ea3; white-space: nowrap; flex: 0 0 auto; min-width: 78px; }
        .g-actions { display: flex; gap: 8px; flex: 0 0 auto; }

        .loading, .error, .empty { text-align: center; padding: 40px; color: #8a8ea3; }
        .error { color: #ff6b6b; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(6,6,12,0.7); z-index: 9999; align-items: center; justify-content: center; padding: 16px; }
        .modal.show { display: flex; }
        .modal-card {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1b1b29; border: 1px solid rgba(255,255,255,0.09);
            border-radius: 16px; padding: 24px; max-width: 540px; width: 100%;
            max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal-card h3 { font-size: 18px; font-weight: 700; }
        .modal-card .sub { color: #8a8ea3; font-size: 13px; margin: 3px 0 20px; }

        .field { margin-bottom: 16px; }
        .field label { display: block; color: #b3b7c9; margin-bottom: 7px; font-size: 13px; font-weight: 600; }
        .field input[type="text"] { font-family: inherit; width: 100%; padding: 11px 12px; background: #101019; border: 1px solid #2c2c44; border-radius: 9px; color: #fff; font-size: 14px; }
        .field input[type="text"]:focus { outline: none; border-color: #6c5ce7; }
        .field .hint { color: #6c6f82; font-size: 12px; margin-top: 6px; }

        /* Níveis */
        .levels { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
        .level-opt { display: flex; gap: 9px; align-items: flex-start; padding: 11px; background: #101019; border: 2px solid #2c2c44; border-radius: 10px; cursor: pointer; transition: border-color .15s ease, background .15s ease; }
        .level-opt:hover { border-color: #43436a; }
        .level-opt.active { border-color: #6c5ce7; background: rgba(108,92,231,0.12); }
        .level-opt input { margin-top: 2px; accent-color: #6c5ce7; }
        .lv-title { font-weight: 700; font-size: 13.5px; display: block; }
        .lv-desc { color: #8a8ea3; font-size: 12px; margin-top: 2px; display: block; }

        .custom-box { margin-top: 14px; padding: 15px; background: #101019; border: 1px solid #2c2c44; border-radius: 10px; }
        .custom-box .cfg-row { margin-bottom: 12px; }
        .custom-box .cfg-row label { display: inline-flex; gap: 8px; align-items: center; cursor: pointer; color: #e8e9f0; font-size: 13.5px; }
        .custom-box .cfg-row input, .tab-label input { accent-color: #6c5ce7; }
        .custom-hint { color: #8a8ea3; font-size: 12px; margin-bottom: 10px; }
        .tabs-grid { display: flex; flex-wrap: wrap; gap: 7px; }
        .tab-label { display: inline-flex; align-items: center; gap: 6px; padding: 7px 10px; background: #191926; border: 1px solid #2c2c44; border-radius: 8px; cursor: pointer; font-size: 12.5px; }
        .tab-label:hover { border-color: #43436a; }

        .modal-actions { display: flex; gap: 10px; align-items: center; margin-top: 22px; }

        /* Membros */
        .member-search { font-family: inherit; width: 100%; padding: 11px 12px; background: #101019; border: 1px solid #2c2c44; border-radius: 9px; color: #fff; font-size: 14px; margin-bottom: 12px; }
        .member-search:focus { outline: none; border-color: #6c5ce7; }
        .section-title { color: #b3b7c9; font-size: 13px; font-weight: 700; margin: 4px 0 10px; }
        .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; min-height: 16px; }
        .chip { display: inline-flex; align-items: center; gap: 9px; background: #23233a; border: 1px solid rgba(108,92,231,0.35); border-radius: 999px; padding: 6px 8px 6px 13px; font-size: 13px; }
        .chip button { font-family: inherit; background: rgba(231,76,60,0.9); border: none; color: #fff; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center; padding: 0; }
        .chip button:hover { background: #e74c3c; }
        .add-list { max-height: 260px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .add-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #101019; border: 1px solid #23233a; border-radius: 9px; cursor: pointer; transition: border-color .12s ease, background .12s ease; }
        .add-item:hover { border-color: #6c5ce7; background: rgba(108,92,231,0.08); }
        .ai-name { font-weight: 600; font-size: 14px; }
        .ai-pass { color: #8a8ea3; font-size: 12.5px; }
        .ai-plus { color: #a89bff; font-weight: 800; font-size: 18px; }
        .muted { color: #6c6f82; font-size: 13px; font-style: italic; padding: 8px 0; }

        @media (max-width: 560px) {
            .levels { grid-template-columns: 1fr; }
            .group-row { flex-wrap: wrap; }
            .g-count { min-width: 0; }
            .g-actions { flex: 1 1 100%; }
            .g-actions .btn { flex: 1; }
        }
    </style>
</head>
<body>
    <div class="head">
        <h2>🔐 Grupos e Cargos</h2>
        <p>Defina o nível de acesso de cada cargo e coloque os membros dentro.</p>
    </div>

    <div class="toolbar">
        <button class="btn btn-primary" onclick="openEditModal(null)">➕ Novo Grupo</button>
        <div class="spacer"></div>
        <button class="btn btn-ghost btn-sm" onclick="resetPermissions()">🔄 Restaurar padrão</button>
    </div>

    <div id="container"><div class="loading">Carregando grupos...</div></div>

    <!-- Modal Editar/Criar Grupo -->
    <div id="editModal" class="modal">
        <div class="modal-card">
            <h3 id="editTitle">Editar Grupo</h3>
            <p class="sub" id="editSub"></p>

            <div class="field" id="roleNameField" style="display:none;">
                <label>Identificador do grupo (sem espaços) *</label>
                <input type="text" id="fRoleName" placeholder="ex: gerente_vendas">
                <div class="hint">Só letras minúsculas, números e underline (_). Não muda depois.</div>
            </div>

            <div class="field">
                <label>Nome de exibição *</label>
                <input type="text" id="fDisplayName" placeholder="ex: Gerente de Vendas">
            </div>

            <div class="field">
                <label>Nível de acesso</label>
                <div class="levels" id="levelSelector"></div>
            </div>

            <div class="custom-box" id="customBox" style="display:none;">
                <div class="cfg-row">
                    <label><input type="checkbox" id="fCanConfig"> ⚙️ Pode abrir as Configurações</label>
                </div>
                <div class="custom-hint">Marque exatamente o que este grupo pode ver:</div>
                <div class="tabs-grid" id="customTabs"></div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-danger btn-sm" id="deleteBtn" onclick="deleteCurrentGroup()" style="display:none;">🗑️ Excluir</button>
                <div class="spacer"></div>
                <button class="btn btn-ghost" onclick="closeEditModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="saveGroup()">💾 Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal Membros -->
    <div id="membersModal" class="modal">
        <div class="modal-card">
            <h3>👥 Membros do grupo</h3>
            <p class="sub" id="membersSub"></p>

            <div class="section-title">No grupo (<span id="inCount">0</span>)</div>
            <div class="chips" id="inChips"></div>

            <div class="section-title">Adicionar membro</div>
            <input type="text" class="member-search" id="addSearch" placeholder="🔍 Buscar por nome ou passaporte..." oninput="renderMembersModal()">
            <div class="add-list" id="addList"></div>

            <div class="modal-actions">
                <div class="spacer"></div>
                <button class="btn btn-primary" onclick="closeMembersModal()">Concluído</button>
            </div>
        </div>
    </div>

    <script>
        var GERENTE_PRESET = ['weekly-status','weekly-ranking','pending','absences','members','members-panel','members-overview','members-adv','new-member','ranking','all-deliveries','weekly-report','materials-stats','goals','manager-goals','attendance'];
        var CONFIG_TABS = ['farm-settings','manage-materials','manage-payment-types','role-permissions','edit-permissions','whitelist','family-commandments','weapon-catalog'];

        var LEVELS = [
            { id: 'membro', title: '👤 Membro', desc: 'Só entrega o farm. Sem painel.' },
            { id: 'gerente', title: '🛡️ Gerente', desc: 'Aprova farms, vê status e ranking.' },
            { id: 'admin', title: '⚡ Admin Total', desc: 'Acesso a tudo, com configurações.' },
            { id: 'custom', title: '⚙️ Personalizado', desc: 'Escolhe cada permissão na mão.' }
        ];

        var GROUP_ICONS = {
            'super_admin': '⚡', '01': '🥇', '02': '🥈', 'gerente_geral': '👑',
            'gerente_farm': '🌾', 'gerente_acao': '💥', 'gerente_recrutamento': '📋',
            'gerente_encomendas': '📦', 'gerente_vendas': '💼', 'gerente_de_vendas': '💼', 'member': '👤'
        };
        var PROTECTED = ['super_admin', 'member'];

        var roles = [];
        var tabs = [];
        var members = [];
        var selectedLevel = 'gerente';
        var editingRole = null;
        var membersGroup = null;

        function escapeHtml(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
        function iconFor(r){ return GROUP_ICONS[r.role_name] || '👥'; }

        function levelOf(role){
            var p = role.permissions || [];
            if (p.indexOf('all') >= 0) return 'admin';
            if (p.length === 0) return 'membro';
            var hasConfig = role.can_config || p.some(function(x){ return CONFIG_TABS.indexOf(x) >= 0; });
            if (hasConfig) return 'custom';
            return 'gerente';
        }
        function levelBadge(lv){
            var map = { membro:['Membro','lvl-membro'], gerente:['Gerente','lvl-gerente'], admin:['Admin Total','lvl-admin'], custom:['Personalizado','lvl-custom'] };
            var m = map[lv] || map.custom;
            return '<span class="g-badge '+m[1]+'">'+m[0]+'</span>';
        }
        function uniqueTabs(){
            var seen = {}, out = [];
            for (var i=0;i<tabs.length;i++){ if(!seen[tabs[i].id]){ seen[tabs[i].id]=1; out.push(tabs[i]); } }
            return out;
        }
        function memberCount(roleName){
            return members.filter(function(m){ return (m.groups||[]).indexOf(roleName) >= 0; }).length;
        }

        function loadAll(){
            return Promise.all([
                fetch('/api/admin/role-permissions').then(function(r){return r.json();}),
                fetch('/api/admin/members').then(function(r){return r.json();})
            ]).then(function(res){
                var data = res[0];
                if (data.error){ document.getElementById('container').innerHTML = '<div class="error">Erro: '+escapeHtml(data.error)+'</div>'; return; }
                roles = data.roles || [];
                tabs = data.availableTabs || [];
                members = (res[1] && res[1].members) || [];
                renderGroups();
                if (membersGroup) renderMembersModal();
            }).catch(function(err){
                document.getElementById('container').innerHTML = '<div class="error">Erro ao carregar: '+escapeHtml(err.message)+'</div>';
            });
        }

        // Recarrega só a lista de membros (após adicionar/remover) mantendo os modais
        function refreshMembers(){
            return fetch('/api/admin/members').then(function(r){return r.json();}).then(function(res){
                members = (res && res.members) || [];
                renderGroups();
                if (membersGroup) renderMembersModal();
            });
        }

        function renderGroups(){
            if (roles.length === 0){ document.getElementById('container').innerHTML = '<div class="empty">Nenhum grupo ainda. Clique em “Novo Grupo”.</div>'; return; }
            var html = '<div class="groups-list">';
            for (var i=0;i<roles.length;i++){
                var r = roles[i];
                var lv = levelOf(r);
                var count = memberCount(r.role_name);
                var rn = escapeHtml(r.role_name);
                html += '<div class="group-row">';
                html += '  <span class="g-avatar">'+iconFor(r)+'</span>';
                html += '  <span class="g-info"><span class="g-name">'+escapeHtml(r.display_name)+'</span><span class="g-id">'+rn+'</span></span>';
                html += '  '+levelBadge(lv);
                html += '  <span class="g-count">👤 '+count+' membro'+(count===1?'':'s')+'</span>';
                html += '  <span class="g-actions">';
                html += '    <button class="btn btn-ghost btn-sm" onclick="openMembersModal(\''+rn+'\')">👥 Membros</button>';
                html += '    <button class="btn btn-primary btn-sm" onclick="openEditModal(\''+rn+'\')">✏️ Editar</button>';
                html += '  </span>';
                html += '</div>';
            }
            html += '</div>';
            document.getElementById('container').innerHTML = html;
        }

        // ===== Modal Editar/Criar =====
        function renderLevelSelector(){
            var html = '';
            for (var i=0;i<LEVELS.length;i++){
                var l = LEVELS[i];
                html += '<label class="level-opt'+(selectedLevel===l.id?' active':'')+'" onclick="selectLevel(\''+l.id+'\')">';
                html += '<input type="radio" name="lvl" '+(selectedLevel===l.id?'checked':'')+'>';
                html += '<span><span class="lv-title">'+l.title+'</span><span class="lv-desc">'+l.desc+'</span></span>';
                html += '</label>';
            }
            document.getElementById('levelSelector').innerHTML = html;
        }
        function selectLevel(lv){
            selectedLevel = lv;
            renderLevelSelector();
            document.getElementById('customBox').style.display = (lv==='custom') ? 'block' : 'none';
        }
        function renderCustomTabs(checkedList){
            var list = uniqueTabs();
            var html = '';
            for (var i=0;i<list.length;i++){
                var t = list[i];
                var on = checkedList.indexOf(t.id) >= 0;
                html += '<label class="tab-label"><input type="checkbox" class="ctab" data-tab="'+escapeHtml(t.id)+'" '+(on?'checked':'')+'> '+escapeHtml((t.icon?t.icon+' ':'')+t.name)+'</label>';
            }
            document.getElementById('customTabs').innerHTML = html;
        }

        function openEditModal(roleName){
            editingRole = roleName ? roles.filter(function(r){return r.role_name===roleName;})[0] : null;
            var isNew = !editingRole;

            document.getElementById('editTitle').textContent = isNew ? '➕ Novo Grupo' : '✏️ Editar Grupo';
            document.getElementById('roleNameField').style.display = isNew ? 'block' : 'none';
            document.getElementById('fRoleName').value = '';
            document.getElementById('fDisplayName').value = isNew ? '' : editingRole.display_name;
            document.getElementById('editSub').textContent = isNew ? 'Defina o grupo e quem pode o quê.' : ('Identificador: ' + editingRole.role_name);

            var lv = isNew ? 'gerente' : levelOf(editingRole);
            selectedLevel = lv;
            renderLevelSelector();
            document.getElementById('customBox').style.display = (lv==='custom') ? 'block' : 'none';
            document.getElementById('fCanConfig').checked = isNew ? false : !!editingRole.can_config;
            renderCustomTabs(isNew ? [] : (editingRole.permissions || []));

            var canDelete = !isNew && PROTECTED.indexOf(editingRole.role_name) < 0;
            document.getElementById('deleteBtn').style.display = canDelete ? 'inline-block' : 'none';

            document.getElementById('editModal').classList.add('show');
        }
        function closeEditModal(){ document.getElementById('editModal').classList.remove('show'); editingRole = null; }

        function permsForLevel(){
            if (selectedLevel === 'membro') return { permissions: [], can_config: 0 };
            if (selectedLevel === 'gerente') return { permissions: GERENTE_PRESET.slice(), can_config: 0 };
            if (selectedLevel === 'admin') return { permissions: ['all'], can_config: 1 };
            var checked = document.querySelectorAll('.ctab:checked');
            var perms = [];
            for (var i=0;i<checked.length;i++) perms.push(checked[i].getAttribute('data-tab'));
            return { permissions: perms, can_config: document.getElementById('fCanConfig').checked ? 1 : 0 };
        }

        function saveGroup(){
            var displayName = document.getElementById('fDisplayName').value.trim();
            if (!displayName){ alert('Informe o nome de exibição.'); return; }
            var body = permsForLevel();
            body.display_name = displayName;

            var isNew = !editingRole;
            var url, method;
            if (isNew){
                var roleName = document.getElementById('fRoleName').value.trim().toLowerCase();
                if (!roleName){ alert('Informe o identificador do grupo.'); return; }
                if (!/^[a-z0-9_]+$/.test(roleName)){ alert('O identificador deve ter só letras minúsculas, números e underline (_).'); return; }
                body.role_name = roleName;
                url = '/api/admin/role-permissions'; method = 'POST';
            } else {
                url = '/api/admin/role-permissions/' + editingRole.role_name; method = 'PUT';
            }

            fetch(url, { method: method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) })
                .then(function(r){return r.json();})
                .then(function(d){
                    if (d.success){ closeEditModal(); loadAll(); }
                    else alert('Erro: ' + (d.error || 'falha ao salvar'));
                })
                .catch(function(e){ alert('Erro: ' + e.message); });
        }

        function deleteCurrentGroup(){
            if (!editingRole) return;
            if (!confirm('Excluir o grupo "'+editingRole.display_name+'"? Esta ação não pode ser desfeita.')) return;
            fetch('/api/admin/role-permissions/' + editingRole.role_name, { method: 'DELETE' })
                .then(function(r){return r.json();})
                .then(function(d){ if (d.success){ closeEditModal(); loadAll(); } else alert('Erro: ' + (d.error||'falha')); })
                .catch(function(e){ alert('Erro: ' + e.message); });
        }

        // ===== Modal Membros =====
        function openMembersModal(roleName){
            membersGroup = roles.filter(function(r){return r.role_name===roleName;})[0];
            if (!membersGroup) return;
            document.getElementById('membersSub').textContent = membersGroup.display_name + ' (' + roleName + ')';
            document.getElementById('addSearch').value = '';
            renderMembersModal();
            document.getElementById('membersModal').classList.add('show');
        }
        function closeMembersModal(){ document.getElementById('membersModal').classList.remove('show'); membersGroup = null; }

        function renderMembersModal(){
            if (!membersGroup) return;
            var rn = membersGroup.role_name;
            var inGroup = members.filter(function(m){ return (m.groups||[]).indexOf(rn) >= 0; });
            var search = (document.getElementById('addSearch').value || '').toLowerCase();
            var available = members.filter(function(m){
                if ((m.groups||[]).indexOf(rn) >= 0) return false;
                if (!search) return true;
                return String(m.name||'').toLowerCase().indexOf(search) >= 0 || String(m.passport||'').toLowerCase().indexOf(search) >= 0;
            });

            document.getElementById('inCount').textContent = inGroup.length;
            var chips = '';
            if (inGroup.length === 0) chips = '<span class="muted">Ninguém neste grupo ainda.</span>';
            for (var i=0;i<inGroup.length;i++){
                var m = inGroup[i];
                chips += '<span class="chip">'+escapeHtml(m.name)+' <button title="Remover" onclick="removeMember('+m.id+')">×</button></span>';
            }
            document.getElementById('inChips').innerHTML = chips;

            var list = '';
            if (available.length === 0) list = '<span class="muted">Nenhum usuário para adicionar.</span>';
            for (var j=0;j<available.length && j<200;j++){
                var u = available[j];
                list += '<div class="add-item" onclick="addMember('+u.id+')"><span><span class="ai-name">'+escapeHtml(u.name)+'</span> <span class="ai-pass">· '+escapeHtml(u.passport||'-')+'</span></span><span class="ai-plus">+</span></div>';
            }
            document.getElementById('addList').innerHTML = list;
        }

        function addMember(userId){
            if (!membersGroup) return;
            var rn = membersGroup.role_name;
            fetch('/api/admin/role-permissions/' + rn + '/members', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ user_id: userId }) })
                .then(function(r){return r.json();})
                .then(function(d){
                    if (d.success){ refreshMembers(); }
                    else alert('Erro: ' + (d.error || 'falha ao adicionar'));
                })
                .catch(function(e){ alert('Erro: ' + e.message); });
        }
        function removeMember(userId){
            if (!membersGroup) return;
            var rn = membersGroup.role_name;
            fetch('/api/admin/role-permissions/' + rn + '/members/' + userId, { method:'DELETE' })
                .then(function(r){return r.json();})
                .then(function(d){
                    if (d.success){ refreshMembers(); }
                    else alert('Erro: ' + (d.error || 'falha ao remover'));
                })
                .catch(function(e){ alert('Erro: ' + e.message); });
        }

        function resetPermissions(){
            if (!confirm('Restaurar as permissões de TODOS os grupos para o padrão? Isso substitui as permissões atuais.')) return;
            fetch('/api/admin/role-permissions/reset', { method:'POST', headers:{'Content-Type':'application/json'} })
                .then(function(r){return r.json();})
                .then(function(d){ if (d.success){ loadAll(); } else alert('Erro: ' + (d.error||'falha')); })
                .catch(function(e){ alert('Erro: ' + e.message); });
        }

        document.addEventListener('click', function(e){
            if (e.target.classList && e.target.classList.contains('modal')) e.target.classList.remove('show');
        });

        loadAll();
    </script>
</body>
</html>
