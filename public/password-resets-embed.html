<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de Senha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #12121f; color: #fff; padding: 20px; }
        h2 { margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 25px; font-size: 14px; }
        .card { background: #1a1a2e; border-radius: 12px; margin-bottom: 15px; padding: 20px; border-left: 4px solid #6c5ce7; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .user-info { display: flex; flex-direction: column; gap: 5px; }
        .user-name { font-size: 1.1rem; font-weight: 600; }
        .user-passport { color: #a29bfe; font-size: 0.9rem; }
        .request-date { color: #888; font-size: 0.85rem; }
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s; }
        .btn-approve { background: #00b894; color: white; }
        .btn-approve:hover { background: #00a085; }
        .btn-reject { background: #e74c3c; color: white; }
        .btn-reject:hover { background: #c0392b; }
        .empty-state { text-align: center; padding: 50px; color: #888; font-size: 1.1rem; }
        .loading { text-align: center; padding: 50px; color: #888; }
        .success-card { background: #1a1a2e; border-radius: 12px; padding: 25px; text-align: center; border: 2px solid #00b894; }
        .success-card h3 { color: #00b894; margin-bottom: 15px; }
        .success-card .password { font-size: 2rem; font-weight: bold; background: #0f0f1a; padding: 15px 25px; border-radius: 8px; font-family: monospace; letter-spacing: 3px; display: inline-block; margin: 15px 0; }
        .success-card .info { color: #888; font-size: 0.9rem; margin-top: 10px; }
        .btn-copy { background: #6c5ce7; color: white; margin-top: 15px; }
        .btn-copy:hover { background: #5a4fcf; }
    </style>
</head>
<body>
    <h2>🔑 Recuperação de Senha</h2>
    <p class="subtitle">Solicitações de membros que esqueceram a senha</p>
    
    <div id="container">
        <div class="loading">⏳ Carregando solicitações...</div>
    </div>

    <script>
        // Carregar solicitações
        function loadRequests() {
            fetch('/api/admin/password-resets/pending')
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    var container = document.getElementById('container');
                    
                    if (!data.requests || data.requests.length === 0) {
                        container.innerHTML = '<div class="empty-state">✅ Nenhuma solicitação de recuperação pendente</div>';
                        return;
                    }
                    
                    var html = '';
                    for (var i = 0; i < data.requests.length; i++) {
                        var r = data.requests[i];
                        var date = new Date(r.requested_at);
                        var dateStr = date.toLocaleDateString('pt-BR') + ' às ' + date.toLocaleTimeString('pt-BR');
                        
                        html += '<div class="card" id="card-' + r.id + '">';
                        html += '<div class="card-header">';
                        html += '<div class="user-info">';
                        html += '<span class="user-name">👤 ' + r.user_name + '</span>';
                        html += '<span class="user-passport">🎫 Passaporte: ' + r.user_passport + '</span>';
                        html += '</div>';
                        html += '<div class="request-date">📅 Solicitado em ' + dateStr + '</div>';
                        html += '</div>';
                        html += '<div class="actions">';
                        html += '<button class="btn btn-approve" onclick="approve(' + r.id + ')">✅ Gerar Nova Senha</button>';
                        html += '<button class="btn btn-reject" onclick="reject(' + r.id + ')">❌ Rejeitar</button>';
                        html += '</div>';
                        html += '</div>';
                    }
                    
                    container.innerHTML = html;
                })
                .catch(function(err) {
                    document.getElementById('container').innerHTML = '<div class="empty-state">❌ Erro ao carregar: ' + err.message + '</div>';
                });
        }
        
        // Aprovar e gerar nova senha
        function approve(id) {
            if (!confirm('Gerar uma nova senha para este usuário?')) return;
            
            fetch('/api/admin/password-resets/' + id + '/approve', { method: 'POST' })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.success) {
                        var card = document.getElementById('card-' + id);
                        card.innerHTML = '<div class="success-card">' +
                            '<h3>✅ Senha Resetada!</h3>' +
                            '<p><strong>👤 ' + data.user_name + '</strong></p>' +
                            '<p>🎫 Passaporte: ' + data.user_passport + '</p>' +
                            '<div class="password">' + data.new_password + '</div>' +
                            '<p class="info">⚠️ Anote ou envie essa senha para o membro!</p>' +
                            '<button class="btn btn-copy" onclick="copyPassword(\'' + data.new_password + '\')">📋 Copiar Senha</button>' +
                            '</div>';
                    } else {
                        alert('❌ Erro: ' + (data.error || 'Falha ao resetar'));
                    }
                })
                .catch(function(err) {
                    alert('❌ Erro: ' + err.message);
                });
        }
        
        // Rejeitar solicitação
        function reject(id) {
            if (!confirm('Rejeitar esta solicitação?')) return;
            
            fetch('/api/admin/password-resets/' + id + '/reject', { method: 'POST' })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.success) {
                        var card = document.getElementById('card-' + id);
                        card.remove();
                        
                        // Verificar se ainda tem cards
                        var container = document.getElementById('container');
                        if (container.querySelectorAll('.card').length === 0) {
                            container.innerHTML = '<div class="empty-state">✅ Nenhuma solicitação de recuperação pendente</div>';
                        }
                    } else {
                        alert('❌ Erro: ' + (data.error || 'Falha ao rejeitar'));
                    }
                })
                .catch(function(err) {
                    alert('❌ Erro: ' + err.message);
                });
        }
        
        // Copiar senha
        function copyPassword(pwd) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(pwd).then(function() {
                    alert('✅ Senha copiada!');
                });
            } else {
                prompt('Copie a senha:', pwd);
            }
        }
        
        // Carregar ao iniciar
        loadRequests();
    </script>
</body>
</html>
