<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghosts Farm Control - Login</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container login-container">
        <div class="login-box">
            <div class="logo">
                <h1>👻 GHOSTS</h1>
                <p>Farm Control System</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="passport">Passaporte</label>
                    <input type="text" id="passport" name="passport" required placeholder="Digite seu passaporte">
                </div>
                
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" required placeholder="Digite sua senha">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Entrar</button>
            </form>
            
            <div id="message" class="message"></div>
            
            <div class="register-link">
                <p>Ainda não é membro? <a href="/register">Cadastre-se</a></p>
            </div>
        </div>
    </div>
    
    <script src="js/login.js"></script>
</body>
</html>
