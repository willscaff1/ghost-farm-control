<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Semanal</title>
    <link rel="stylesheet" href="css/theme-polish.css?v=20260612theme1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            text-align: center;
        }
        .header h1 { color: #2d3436; font-size: 36px; margin-bottom: 15px; }
        .week-selector select {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            min-width: 300px;
        }
        .winners {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .winner-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .winner-card.first {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: white;
        }
        .winner-card.second {
            background: linear-gradient(135deg, #C0C0C0 0%, #A8A8A8 100%);
            color: white;
        }
        .winner-card.third {
            background: linear-gradient(135deg, #CD7F32 0%, #B87333 100%);
            color: white;
        }
        .winner-card .medal { font-size: 60px; margin-bottom: 15px; }
        .winner-card h2 { font-size: 24px; margin-bottom: 10px; }
        .winner-card .name { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .winner-card .stats { font-size: 28px; font-weight: bold; margin-top: 15px; }
        .ranking-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .ranking-card h2 { color: #2d3436; font-size: 24px; margin-bottom: 20px; }
        .ranking-table { width: 100%; border-collapse: collapse; }
        .ranking-table th {
            background: #667eea;
            color: white;
            padding: 18px;
            text-align: left;
            font-weight: 600;
        }
        .ranking-table th:first-child { border-radius: 10px 0 0 0; }
        .ranking-table th:last-child { border-radius: 0 10px 0 0; }
        .ranking-table td { padding: 18px; border-bottom: 1px solid #f1f3f5; }
        .ranking-table tbody tr:hover { background: #f8f9fa; }
        .ranking-table .highlight { background: rgba(102, 126, 234, 0.05); font-weight: 500; }
        .empty-state { text-align: center; padding: 80px 20px; color: #b2bec3; }
        @media (max-width: 968px) { .winners { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 Ranking Semanal</h1>
            <select id="weekSelect" onchange="load()">
                <option>Carregando...</option>
            </select>
        </div>

        <div id="winners" style="display:none;" class="winners">
            <div class="winner-card first">
                <div class="medal">🥇</div>
                <h2>1º LUGAR</h2>
                <div class="name" id="w1"></div>
                <div class="stats" id="s1"></div>
            </div>
            <div class="winner-card second">
                <div class="medal">🥈</div>
                <h2>2º LUGAR</h2>
                <div class="name" id="w2"></div>
                <div class="stats" id="s2"></div>
            </div>
            <div class="winner-card third">
                <div class="medal">🥉</div>
                <h2>3º LUGAR</h2>
                <div class="name" id="w3"></div>
                <div class="stats" id="s3"></div>
            </div>
        </div>

        <div class="ranking-card">
            <h2>📊 Ranking Completo</h2>
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th style="width:80px;text-align:center">Pos</th>
                        <th>Nome</th>
                        <th style="text-align:center">Passaporte</th>
                        <th style="text-align:center">🎯 Farms</th>
                        <th style="text-align:center">📦 Materiais</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr><td colspan="5" style="text-align:center;padding:40px">Selecione uma semana</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function getWeek(offset) {
            const d = new Date();
            const day = d.getDay();
            // Ajustar para a segunda-feira da semana atual
            const diff = day === 0 ? -6 : 1 - day;
            d.setDate(d.getDate() + diff + (offset * 7));
            d.setHours(0,0,0,0);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const dayStr = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${dayStr}`;
        }

        function init() {
            const sel = document.getElementById('weekSelect');
            let html = '';
            for(let i = -8; i <= 2; i++) {
                const w = getWeek(i);
                const d = new Date(w + 'T00:00:00');
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                const label = `${day}-${month}-${year}`;
                html += `<option value="${w}" ${i===0?'selected':''}>${label}${i===0?' (Esta semana)':''}</option>`;
            }
            sel.innerHTML = html;
            load();
        }

        async function load() {
            const week = document.getElementById('weekSelect').value;
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px">Carregando...</td></tr>';

            try {
                const res = await fetch('/api/admin/members');
                const data = await res.json();
                
                const rank = data.members
                    .map(m => {
                        const approved = (m.deliveries || []).filter(d => 
                            d.status === 'approved' && d.week_start === week
                        );
                        const farms = approved.length;
                        const mats = approved.reduce((s, d) => 
                            s + (d.items || []).reduce((sum, i) => sum + i.amount, 0), 0
                        );
                        return { name: m.name, passport: m.passport, farms, mats };
                    })
                    .filter(r => r.farms > 0)
                    .sort((a, b) => b.farms - a.farms || b.mats - a.mats);

                if (rank.length === 0) {
                    document.getElementById('winners').style.display = 'none';
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state"><h2>Nenhuma entrega aprovada</h2></td></tr>';
                    return;
                }

                if (rank.length >= 3) {
                    document.getElementById('winners').style.display = 'grid';
                    document.getElementById('w1').textContent = rank[0].name;
                    document.getElementById('s1').textContent = `${rank[0].farms} farms • ${rank[0].mats} materiais`;
                    document.getElementById('w2').textContent = rank[1].name;
                    document.getElementById('s2').textContent = `${rank[1].farms} farms • ${rank[1].mats} materiais`;
                    document.getElementById('w3').textContent = rank[2].name;
                    document.getElementById('s3').textContent = `${rank[2].farms} farms • ${rank[2].mats} materiais`;
                } else {
                    document.getElementById('winners').style.display = 'none';
                }

                const medals = ['🥇', '🥈', '🥉'];
                tbody.innerHTML = rank.map((r, i) => `
                    <tr class="${i<3?'highlight':''}">
                        <td style="text-align:center;font-size:20px">${medals[i] || (i+1)+'º'}</td>
                        <td style="font-weight:${i<3?'600':'normal'}">${r.name}</td>
                        <td style="text-align:center;font-family:monospace;color:#636e72">${r.passport}</td>
                        <td style="text-align:center;font-size:20px;font-weight:bold;color:#00b894">${r.farms}</td>
                        <td style="text-align:center;font-size:16px;color:#636e72">${r.mats}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#ff7675;padding:40px">❌ Erro ao carregar</td></tr>';
            }
        }

        init();
        setInterval(load, 30000);
    </script>
</body>
</html>
