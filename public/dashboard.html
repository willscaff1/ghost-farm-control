<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghosts Farm Control - Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">👻 GHOSTS - Farm Control</div>
        <div class="nav-user">
            <span id="userName"></span>
            <button id="adminBtn" class="btn btn-small btn-secondary" style="display: none;" onclick="location.href='/admin'">Admin</button>
            <button class="btn btn-small btn-danger" onclick="logout()">Sair</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Barra de Seleção de Semana -->
        <div class="week-bar">
            <button class="week-nav-btn" onclick="changeWeek(-1)" id="prevWeekBtn">◀</button>
            <div class="week-center">
                <span class="week-title">📅 SEMANA</span>
                <span class="week-label" id="weekLabel">Carregando...</span>
                <div id="weekStatus"></div>
            </div>
            <button class="week-nav-btn" onclick="changeWeek(1)" id="nextWeekBtn">▶</button>
        </div>

        <!-- Layout 2 Colunas -->
        <div class="two-columns">
            <!-- Coluna Esquerda - Progresso -->
            <div class="column-left">
                <div class="panel">
                    <div class="panel-header">
                        <h2>📊 Meu Progresso</h2>
                    </div>
                    <div id="progressBars" class="progress-list">
                        <div class="progress-empty">Carregando...</div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-row">
                    <div class="stat-box success">
                        <span class="stat-number" id="farmsDelivered">0</span>
                        <span class="stat-text">Aprovados</span>
                    </div>
                    <div class="stat-box danger clickable" onclick="showMyWarnings()">
                        <span class="stat-number" id="warningsCount">0</span>
                        <span class="stat-text">Advertências</span>
                    </div>
                </div>
            </div>

            <!-- Coluna Direita - Formulário -->
            <div class="column-right">
                <div class="panel" id="deliveryPanel">
                    <div class="panel-header">
                        <h2 id="formTitle">📦 Registrar Farm</h2>
                    </div>
                    
                    <form id="deliveryForm" enctype="multipart/form-data">
                        <input type="hidden" id="weekSelect" value="0">
                        
                        <div class="materials-grid" id="materialsInputs"></div>
                        
                        <div class="form-group">
                            <label>Observações <span class="optional">(opcional)</span></label>
                            <input type="text" id="description" name="description" placeholder="Ex: Farm feito dia 09/12">
                        </div>
                        
                        <div class="form-group">
                            <label>📷 Prints do Farm <span class="required">*</span></label>
                            <div class="screenshots-area">
                                <div id="screenshotsPreview" class="screenshots-grid"></div>
                                <button type="button" class="btn-add-screenshot" onclick="addScreenshot()">+ Adicionar Print</button>
                                <input type="file" id="screenshotInput" accept="image/*" style="display: none;" onchange="handleScreenshotSelect(event)">
                            </div>
                        </div>
                        
                        <button type="submit" id="submitDeliveryBtn" class="btn-submit secondary">💾 Salvar Progresso</button>
                    </form>
                    <div id="formMessage" class="form-message"></div>
                </div>

                <!-- Justificativa -->
                <div class="panel panel-small" id="absenceCard" style="display: none;">
                    <h3>📝 Não vai conseguir fazer o farm?</h3>
                    <form id="absenceForm" class="absence-form">
                        <textarea id="absenceReason" placeholder="Motivo (mínimo 10 caracteres)" required></textarea>
                        <button type="submit" class="btn-justify">Justificar</button>
                    </form>
                    <div id="absenceMessage" class="form-message"></div>
                </div>
            </div>
        </div>

        <!-- Histórico -->
        <div class="panel full-width">
            <div class="panel-header">
                <h2>📋 Meu Histórico</h2>
            </div>
            <div id="deliveriesList" class="history-list">
                <div class="loading-text">Carregando...</div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="imageModal" class="modal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img id="modalImage" class="modal-content">
    </div>

    <div id="warningsModal" class="modal warnings-modal">
        <div class="warnings-modal-content">
            <div class="warnings-modal-header">
                <h2>⚠️ Minhas Advertências</h2>
                <button class="modal-close-btn" onclick="closeWarningsModal()">&times;</button>
            </div>
            <div class="warnings-modal-body" id="warningsModalBody"></div>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
